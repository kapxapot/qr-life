<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" width="140" height="140" role="img" aria-label="QR code square anchor">
  <rect width="70" height="70" fill="white"></rect>

  <!-- Outer square -->
  <rect x="0" y="0" width="70" height="70" fill="black"></rect>

  <!-- White separator -->
  <rect x="10" y="10" width="50" height="50" fill="white"></rect>

  <!-- Inner square -->
  <rect x="20" y="20" width="30" height="30" fill="black"></rect>
</svg>